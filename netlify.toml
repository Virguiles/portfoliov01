[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Domain redirects
[[redirects]]
  from = "https://virgilepopote.com/*"
  to = "https://virgile.site/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://virgilepopote.com/*"
  to = "https://virgile.site/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.virgilepopote.com/*"
  to = "https://virgile.site/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.virgilepopote.com/*"
  to = "https://virgile.site/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
